name: Persistent VPS Terminal

on:
  workflow_dispatch: # اجرای دستی ترمینال

permissions:
  contents: write # دسترسی برای ذخیره فایل‌ها

jobs:
  vps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Interactive Terminal (tmate)
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false # این خط تغییر کرد تا نیاز به کلید SSH نباشه

      - name: Save State (Commit & Push)
        if: always() # حتی اگه زمان تموم شد، فایل‌ها رو ذخیره کن
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Auto-save terminal state" || echo "No changes to save"
          git push
